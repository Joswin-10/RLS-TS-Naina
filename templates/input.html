<!DOCTYPE html>
<html>
<head>
    <title>CPU Scheduling Simulator - Input</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .container-box {
            max-width: 700px;
            margin-top: 50px;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container container-box">

    <h1 class="text-center mb-4">Add Processes 🚀</h1>

    <form action="/add" method="POST">

        <div class="mb-3">
            <label class="form-label">Process ID</label>
            <input type="text" class="form-control" name="pid" placeholder="P1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Arrival Time</label>
            <input type="number" class="form-control" name="arrival" min="0" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Burst Time</label>
            <input type="number" class="form-control" name="burst" min="1" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Add Process
        </button>

    </form>

    <hr>

    <h3>Current Processes</h3>

    {% if processes %}
        <table class="table table-bordered">
            <tr>
                <th>PID</th>
                <th>Arrival Time</th>
                <th>Burst Time</th>
            </tr>

            {% for p in processes %}
            <tr>
                <td>{{ p.pid }}</td>
                <td>{{ p.arrival_time }}</td>
                <td>{{ p.burst_time }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No processes added yet.</p>
    {% endif %}

    <div class="mt-4">
        <a href="/run/fcfs" class="btn btn-primary">Run FCFS</a>
        <a href="/run/sjf" class="btn btn-success">Run SJF</a>
        <a href="/run/rr" class="btn btn-warning">Run Round Robin</a>
    </div>

    <div class="mt-3">
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>

</div>

</body>
</html>
